# 模型配置
model:
  text_dim: 768
  image_dim: 768
  capsule_dim: 64
  num_capsules: 64
  lambda: 0.6  # 图胶囊网络权重系数
  phi: 0.7     # 真实新闻LE-MMD权重
  eta: 0.5     # 虚假新闻LE-MMD权重
  tau: 0.6     # 质量控制阈值

# 数据集配置
datasets:
  weibo:
    text_max_len: 100
    image_patches: 200
  politifact:
    text_max_len: 300
    image_patches: 200
  gossipcop:
    text_max_len: 200
    image_patches: 200

# LLM配置
llm:
  model_name: "gpt-3.5-turbo-0613"
  temperature: 0.0
  top_p: 1.0
  max_tokens: 300
  presence_penalty: 0.0
  frequency_penalty: 0.0
  seed: 42
  max_retries: 5
  base_delay: 1.0
  backoff_factor: 2.0

# 训练配置
training:
  batch_size: 32
  learning_rate: 1e-4
  epochs: 50
  device: "cuda"
  num_workers: 4
  seed: 42